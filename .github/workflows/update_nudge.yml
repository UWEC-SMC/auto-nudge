name: Auto-Nudge
run-name: ${{ github.actor }} running Auto-Nudge
on:
    schedule:
        - cron: "0 0,12 * * *" # Runs at midnight and noon UTC
    workflow_dispatch: 
        inputs:
            force_update:
                description: "Forces the configuration to update its values"
                required: true
                default: "False"
                type: choice
                options:
                    - "True"
                    - "False"
env:
    CONFIG_PATH: "v1/nudge_config.json"
    PYTHON_VERSION: "3.12"
jobs:
    update_nudge:
        runs-on: ubuntu-latest
        env:
            NUDGE_FORCE_UPDATE: ${{ github.event.inputs.force_update }}
        steps:
            - name: Check out repo
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: ${{ env.PYTHON_VERSION }}

            - name: Cache Python dependencies
              uses: actions/cache@v4
              with:
                path: ~/.cache/pip
                key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
                restore-keys: |
                  ${{ runner.os }}-pip-

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Run Python script
              run: python main.py

            - name: Check if nudge_config.json has been modified
              run: |
                if ! git diff --quiet ${{ env.CONFIG_PATH }}; then
                  echo "CONFIG_CHANGED=true" >> $GITHUB_ENV
                else
                  echo "CONFIG_CHANGED=false" >> $GITHUB_ENV
                fi
            
            - name: Change detected - commit and push changes
              if: env.CONFIG_CHANGED == 'true'
              run: |
                echo "Change detected in ${{ env.CONFIG_PATH }}. Saving changes."
                git config --global user.name "github-actions[bot]"
                git config --global user.email "github-actions[bot]@users.noreply.github.com"
                git add ${{ env.CONFIG_PATH }}
                git commit -m ${{ env.COMMIT_MSG }}
                git push
            
            - name: No change detected
              if: env.CONFIG_CHANGED == 'false'
              run : |
                echo "No change detected."