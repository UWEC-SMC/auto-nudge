name: Post-merge cleanup
run-name: cleaned up working branches
on:
    push:
        branches:
            - main
jobs:
    post_merge_job:
        if: github.actor != 'github-actions[bot]'
        runs-on: ubuntu-latest
        env:
            AUTO_NUDGE_BRANCH_PREFIX: auto-nudge
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
              with:
                fetch-depth: 1
            
            - name: Get merged branch name
              run: |
                MERGED_BRANCH=$(git log --merges --oneline --first-parent -n 1 | awk '{print $NF}')
                echo "Merged branch: $MERGED_BRANCH"
                echo "MERGED_BRANCH=$MERGED_BRANCH" >> $GITHUB_ENV
            
            - name: Delete old ${{ env.AUTO_NUDGE_BRANCH_PREFIX }} branch
              run: |
                if [[ ${{ env.MERGED_BRANCH }} == *${{ env.AUTO_NUDGE_BRANCH_PREFIX }}* ]]; then
                    git branch -d ${{ env.MERGED_BRANCH }}
                else
                    echo "Merged branch isn't an auto-nudge update."